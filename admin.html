<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 패널 — 감염병 모의훈련</title>
<style>
  :root {
    --primary: #1a3a5c;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #d1dbe8;
    --text: #1e2a38;
    --muted: #6b7c93;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 로그인 화면 ── */
  #screen-login {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8a 60%, #1a5276 100%);
  }
  .login-card {
    background: white; border-radius: 18px; padding: 48px 40px;
    width: 420px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .icon { font-size: 52px; display: block; margin-bottom: 10px; }
  .login-logo h1 { font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1.4; }
  .login-logo p { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 8px;
    font-size: 15px; font-family: inherit; color: var(--text); transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--primary); }
  .btn-login {
    width: 100%; padding: 14px; background: var(--primary); color: white;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 6px; transition: background 0.2s;
  }
  .btn-login:hover { background: #244f7a; }
  .login-error {
    background: #fdecea; border-left: 4px solid #e74c3c; border-radius: 6px;
    padding: 10px 14px; font-size: 13px; color: #c0392b;
    margin-top: 14px; display: none;
  }
  .login-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; }

  /* ── 관리자 패널 ── */
  #screen-admin { display: none; min-height: 100vh; background: var(--bg); }
  .admin-header {
    background: var(--primary); color: white; padding: 0 24px;
    display: flex; align-items: center; gap: 16px; height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .admin-header h1 { font-size: 18px; font-weight: 700; flex: 1; }
  .btn-admin-back {
    padding: 8px 16px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-admin-back:hover { background: rgba(255,255,255,0.25); }
  .btn-logout {
    padding: 8px 16px; background: rgba(231,76,60,0.25); border: 1px solid rgba(231,76,60,0.4);
    color: white; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(231,76,60,0.45); }
  .admin-body { display: flex; min-height: calc(100vh - 64px); }
  .admin-sidebar {
    width: 260px; flex-shrink: 0; background: white; border-right: 1px solid var(--border);
    padding: 20px 0; overflow-y: auto; max-height: calc(100vh - 64px); position: sticky; top: 64px;
  }
  .admin-sidebar h3 { padding: 0 20px 12px; font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; }
  .admin-scenario-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 20px;
    font-size: 14px; cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; font-family: inherit; color: var(--text); transition: background 0.15s;
  }
  .admin-scenario-item:hover { background: #f0f4f8; }
  .admin-scenario-item.active { background: #eaf2ff; color: var(--primary); font-weight: 700; }
  .admin-scenario-item .del-btn {
    margin-left: auto; opacity: 0; color: #e74c3c; background: none; border: none;
    cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px;
    transition: opacity 0.15s; font-family: inherit;
  }
  .admin-scenario-item:hover .del-btn { opacity: 1; }
  .admin-scenario-item .hide-btn {
    opacity: 0; background: none; border: none; cursor: pointer; font-size: 13px;
    padding: 2px 4px; border-radius: 4px; transition: opacity 0.15s;
  }
  .admin-scenario-item:hover .hide-btn { opacity: 1; }
  .admin-scenario-item.hidden-scenario .hide-btn { opacity: 1; }
  .btn-add-scenario {
    display: block; width: calc(100% - 40px); margin: 12px 20px 0;
    padding: 10px; background: var(--primary); color: white; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: background 0.2s;
  }
  .btn-add-scenario:hover { background: #244f7a; }
  .admin-sidebar-footer { padding: 16px 20px 0; margin-top: 20px; border-top: 1px solid var(--border); }
  .admin-edit-area { flex: 1; padding: 28px; overflow-y: auto; max-height: calc(100vh - 64px); }
  .admin-section {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px; margin-bottom: 20px;
  }
  .admin-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
  .admin-field { margin-bottom: 14px; }
  .admin-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .admin-field input, .admin-field textarea, .admin-field select {
    width: 100%; padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; color: var(--text); transition: border-color 0.2s;
  }
  .admin-field input:focus, .admin-field textarea:focus { outline: none; border-color: var(--primary); }
  .admin-field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .admin-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .admin-phase-section {
    border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  }
  .admin-phase-header {
    padding: 12px 16px; background: #f7f9fc; display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; user-select: none;
  }
  .admin-phase-header:hover { background: #eaf2ff; }
  .admin-phase-header .toggle-icon { margin-left: auto; font-size: 12px; color: var(--muted); }
  .admin-phase-body { padding: 16px; display: none; border-top: 1px solid var(--border); }
  .admin-phase-body.open { display: block; }
  .admin-role-section { background: #f7f9fc; border-radius: 8px; padding: 14px; margin-top: 12px; }
  .admin-role-section h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
  .btn-admin-save {
    padding: 11px 28px; background: var(--primary); color: white; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    margin-right: 10px; transition: background 0.2s;
  }
  .btn-admin-save:hover { background: #244f7a; }
  .btn-admin-danger {
    padding: 11px 20px; background: white; color: #e74c3c; border: 2px solid #e74c3c;
    border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .btn-admin-danger:hover { background: #c0392b; color: white; }
  .admin-empty { text-align: center; color: var(--muted); padding: 60px 40px; }
  .admin-empty .icon { font-size: 48px; display: block; margin-bottom: 12px; }

  /* 키워드 태그 */
  .kw-admin-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: #eaf2ff; color: var(--primary); border-radius: 4px;
    padding: 3px 6px 3px 9px; margin: 2px; font-size: 12px; font-weight: 600;
  }
  .kw-admin-tag button {
    background: none; border: none; cursor: pointer; color: var(--primary);
    font-size: 14px; font-weight: 700; padding: 0 2px; line-height: 1;
    opacity: 0.55; transition: opacity 0.15s;
  }
  .kw-admin-tag button:hover { opacity: 1; color: #c0392b; }
  .kw-admin-wrap {
    display: flex; flex-wrap: wrap; align-items: center; min-height: 28px; padding: 4px;
    border: 2px solid var(--border); border-radius: 8px; background: white; margin-bottom: 6px; gap: 2px;
  }
  .kw-admin-input {
    flex: 1; min-width: 120px; padding: 5px 10px; border: 2px solid var(--border);
    border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; transition: border-color 0.2s;
  }
  .kw-admin-input:focus { border-color: var(--primary); }
  .role-checkbox-group {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px;
    background: #f7f9fc; border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 12px;
  }
  .role-checkbox-label { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; user-select: none; }

  /* 비밀번호 변경 */
  .pw-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .pw-section label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }
  .pw-row { display: flex; gap: 8px; }
  .pw-row input {
    flex: 1; padding: 8px 12px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit;
  }
  .pw-row input:focus { outline: none; border-color: var(--primary); }
  .btn-pw-change {
    padding: 8px 14px; background: #2c3e50; color: white; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }

  /* 조 수 설정 */
  .group-count-row { display: flex; align-items: center; gap: 12px; margin: 8px 0 4px; }
  .btn-group-count {
    width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--border);
    background: white; font-size: 18px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--primary);
    transition: all 0.15s; line-height: 1;
  }
  .btn-group-count:hover { border-color: var(--primary); background: #f0f6ff; }
  .btn-group-count:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; background: #fafafa; }
  #admin-group-count-display { font-size: 20px; font-weight: 700; color: var(--primary); min-width: 52px; text-align: center; }
  .group-count-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* 토스트 */
  .saved-toast {
    position: fixed; bottom: 24px; right: 24px; background: #27ae60; color: white;
    border-radius: 10px; padding: 12px 22px; font-size: 14px; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 9999;
    animation: slideUp 0.3s ease; display: none;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Firebase 연결 상태 */
  .firebase-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #aaa; display: inline-block;
  }
  .status-dot.online { background: #2ecc71; }
  .status-dot.offline { background: #e74c3c; }

  @media (max-width: 768px) {
    .admin-body { flex-direction: column; }
    .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 14px 0; position: relative; top: 0; max-height: none; }
    .admin-edit-area { max-height: none; padding: 16px; }
    .admin-field-row { grid-template-columns: 1fr; }
    .admin-header { padding: 12px 16px; }
    .admin-header h1 { font-size: 15px; }
  }
  @media (max-width: 480px) {
    .admin-header h1 { font-size: 13px; }
    .btn-admin-back { padding: 6px 12px; font-size: 12px; }
    .btn-admin-save, .btn-admin-danger { width: 100%; margin-left: 0; margin-top: 8px; font-size: 14px; }
    .saved-toast { bottom: 12px; right: 12px; left: 12px; text-align: center; }
    .login-card { padding: 32px 20px; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ═══════════════════════════ 로그인 화면 ═══════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🔧</span>
      <h1>관리자 패널</h1>
      <p>감염병 모의훈련 시뮬레이션 — 시나리오 관리</p>
    </div>
    <div class="form-group">
      <label>관리자 비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다. 다시 시도하세요.</div>
    <p class="login-hint">이 페이지는 관리자 전용입니다.</p>
  </div>
</div>

<!-- ═══════════════════════════ 관리자 패널 ═══════════════════════════ -->
<div id="screen-admin">
  <div class="admin-header">
    <h1>🔧 관리자 패널 — 시나리오 편집</h1>
    <span class="firebase-status" id="firebase-status"><span class="status-dot" id="status-dot"></span><span id="status-text">연결 중...</span></span>
    <a class="btn-admin-back" href="index.html">← 메인으로</a>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="admin-body">
    <div class="admin-sidebar">
      <h3>시나리오 목록</h3>
      <div id="admin-scenario-list"></div>
      <button class="btn-add-scenario" onclick="addNewScenario()">+ 새 시나리오 추가</button>
      <div class="admin-sidebar-footer">
        <div class="pw-section" style="margin-top:0;padding-top:0;border-top:none">
          <label>🏷️ 훈련 조 수 설정</label>
          <div class="group-count-row">
            <button class="btn-group-count" onclick="changeGroupCount(-1)">−</button>
            <span id="admin-group-count-display">4조</span>
            <button class="btn-group-count" onclick="changeGroupCount(1)">+</button>
          </div>
          <p class="group-count-hint">현재 <strong id="admin-group-count-num">4</strong>개 조로 운영 (최대 9조)</p>
        </div>
        <div class="pw-section">
          <label>🔑 관리자 비밀번호 변경</label>
          <div class="pw-row">
            <input type="password" id="new-pw" placeholder="새 비밀번호 (4자 이상)">
            <button class="btn-pw-change" onclick="changeAdminPassword()">변경</button>
          </div>
        </div>
        <button class="btn-admin-danger" style="margin-top:12px;margin-left:0;width:100%;font-size:13px" onclick="resetToDefault()">기본값으로 초기화</button>
      </div>
    </div>
    <div class="admin-edit-area" id="admin-edit-area">
      <div class="admin-empty">
        <span class="icon">📋</span>
        <p>좌측에서 시나리오를 선택하거나<br>새 시나리오를 추가하세요.</p>
      </div>
    </div>
  </div>
</div>

<div class="saved-toast" id="saved-toast">✅ 저장되었습니다</div>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE INIT
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyC8KDLecYY5kNGsXxflRgP8-PP_S-DIU54",
  authDomain: "idst-84e4f.firebaseapp.com",
  databaseURL: "https://idst-84e4f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "idst-84e4f",
  storageBucket: "idst-84e4f.firebasestorage.app",
  messagingSenderId: "1019780815428",
  appId: "1:1019780815428:web:3730e229889a21eaa33a11"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Firebase 연결 상태 표시
db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (snap.val()) {
    dot.className = 'status-dot online';
    txt.textContent = 'Firebase 연결됨';
  } else {
    dot.className = 'status-dot offline';
    txt.textContent = 'Firebase 오프라인';
  }
});

// ═══════════════════════════════════════════════════════
//  DEFAULT SCENARIO DATA
// ═══════════════════════════════════════════════════════
const DEFAULT_SCENARIOS = [
  {
    id: 'influenza',
    name: '인플루엔자',
    emoji: '🤧',
    color: '#1a3a5c',
    description: '계절성 인플루엔자 유증상자 발견부터 집단 유행까지 3단계 대응',
    phases: [
      {
        id: 1, title: '유증상자 발견', emoji: '🛑', color: '#e67e22', colorClass: 'phase-1-color',
        activeRoles: ['담임교사', '보건(담당)교사'],
        date: '3월 5일',
        situation: 'A광역시 B구에 소재한 ○○중학교는 총 24학급이며 1개 반에 25명의 학생으로 구성되어 있다. 학교 건물은 서관과 동관 두 개의 동으로 되어 있으며, 서관은 5층 건물로 1층에는 교장실, 교무실, 보건실, 휴게실, 도서관, 1학년 교실이 있고, 2층에는 2학년 교실과 음악실, 3층부터 4층까지는 2·3학년 교실, 5층은 강당으로 구성되어 있다. 동관은 단층으로 체육관이다. 3월 5일 ○○중학교 1학년 6반에서 진한이가 담임교사에게 고열과 심한 기침 및 가슴 통증을 호소하였다.',
        duration: 300,

        }
      }
    ]
  }
];

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const ROLE_ICONS = {
  '담임교사': '📚', '보건(담당)교사': '🩺', '영양(교)사': '🥗',
  '행정실': '📋', '교장/교감': '🏛️', '교육(지원)청': '🏢', '유관기관': '🤝'
};
const ALL_ROLES = ['담임교사', '보건(담당)교사', '영양(교)사', '행정실', '교장/교감', '교육(지원)청', '유관기관'];
const AGENCY_ROLES = ['보건소', '시·군·구청', '도청', '식품의약품안전청'];
const MIN_GROUPS = 1, MAX_GROUPS = 9;

function normalizeRole(role) {
  return AGENCY_ROLES.includes(role) ? '유관기관' : role;
}
function getActiveRoles(phase) {
  const raw = phase.activeRoles ?? Object.keys(phase.missions);
  return [...new Set(raw.map(normalizeRole))];
}

// ═══════════════════════════════════════════════════════
//  LOGIN / AUTH
// ═══════════════════════════════════════════════════════
const DEFAULT_PASSWORD = 'medi2024!';

function getAdminPassword() {
  return localStorage.getItem('ttx_admin_password') || DEFAULT_PASSWORD;
}

function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-error');
  if (pw === getAdminPassword()) {
    err.style.display = 'none';
    sessionStorage.setItem('ttx_admin_session', '1');
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    initAdminPanel();
  } else {
    err.style.display = 'block';
    document.getElementById('login-pw').value = '';
    document.getElementById('login-pw').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem('ttx_admin_session');
  document.getElementById('screen-admin').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('login-pw').value = '';
}

function checkSession() {
  if (sessionStorage.getItem('ttx_admin_session') === '1') {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    initAdminPanel();
  }
}

// ═══════════════════════════════════════════════════════
//  SCENARIO MANAGEMENT
// ═══════════════════════════════════════════════════════
function getScenarios() {
  try {
    const saved = localStorage.getItem('ttx_admin_scenarios');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) return parsed;
      if (typeof parsed === 'string') {
        const inner = JSON.parse(parsed);
        if (Array.isArray(inner) && inner.length) return inner;
      }
    }
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_SCENARIOS));
}

function scenariosToFirebase(scenarios) { return JSON.stringify(scenarios); }
function scenariosFromFirebase(raw) {
  if (!raw) return null;
  if (typeof raw === 'string') { try { return JSON.parse(raw); } catch { return null; } }
  if (Array.isArray(raw)) return raw;
  return null;
}

function saveScenarios(scenarios) {
  localStorage.setItem('ttx_admin_scenarios', JSON.stringify(scenarios));
  db.ref('settings/scenarios').set(scenariosToFirebase(scenarios))
    .catch(e => console.warn('Firebase 저장 실패:', e));
}

// ═══════════════════════════════════════════════════════
//  GROUP COUNT
// ═══════════════════════════════════════════════════════
function getGroupCount() { return parseInt(localStorage.getItem('ttx_group_count') || '4'); }
function saveGroupCount(n) {
  localStorage.setItem('ttx_group_count', String(n));
  db.ref('settings/groupCount').set(n);
}
function changeGroupCount(delta) {
  let n = Math.min(MAX_GROUPS, Math.max(MIN_GROUPS, getGroupCount() + delta));
  saveGroupCount(n);
  renderAdminGroupCount();
  showToast(`✅ 조 수가 ${n}개로 변경되었습니다`);
}
function renderAdminGroupCount() {
  const n = getGroupCount();
  document.getElementById('admin-group-count-display').textContent = `${n}조`;
  document.getElementById('admin-group-count-num').textContent = n;
  const btns = document.querySelectorAll('.btn-group-count');
  if (btns[0]) btns[0].disabled = n <= MIN_GROUPS;
  if (btns[1]) btns[1].disabled = n >= MAX_GROUPS;
}

// ═══════════════════════════════════════════════════════
//  ADMIN PANEL INIT
// ═══════════════════════════════════════════════════════
let adminSelectedScenarioIndex = -1;
let adminKeywordState = {};

function initAdminPanel() {
  renderAdminSidebar();
  renderAdminGroupCount();
  adminSelectedScenarioIndex = -1;
  document.getElementById('admin-edit-area').innerHTML =
    `<div class="admin-empty"><span class="icon">📋</span><p>좌측에서 시나리오를 선택하거나<br>새 시나리오를 추가하세요.</p></div>`;

  // Firebase에서 최신 시나리오 로드
  db.ref('settings/scenarios').once('value').then(snap => {
    if (snap.exists()) {
      const sc = scenariosFromFirebase(snap.val());
      if (sc) {
        localStorage.setItem('ttx_admin_scenarios', JSON.stringify(sc));
        renderAdminSidebar();
        showToast('✅ Firebase에서 최신 시나리오를 불러왔습니다');
      }
    }
  }).catch(() => {});

  // Firebase에서 조 수 로드
  db.ref('settings/groupCount').once('value').then(snap => {
    if (snap.exists()) {
      localStorage.setItem('ttx_group_count', String(snap.val()));
      renderAdminGroupCount();
    }
  }).catch(() => {});
}

function renderAdminSidebar() {
  const scenarios = getScenarios();
  const list = document.getElementById('admin-scenario-list');
  list.innerHTML = scenarios.map((sc, i) => `
    <button class="admin-scenario-item ${i === adminSelectedScenarioIndex ? 'active' : ''} ${sc.hidden ? 'hidden-scenario' : ''}" onclick="selectAdminScenario(${i})">
      <span>${sc.emoji}</span>
      <span style="flex:1;${sc.hidden ? 'opacity:0.45;text-decoration:line-through' : ''}">${sc.name}</span>
      <span class="hide-btn" title="${sc.hidden ? '표시' : '숨기기'}" onclick="event.stopPropagation();toggleHideScenario(${i})">${sc.hidden ? '👁' : '🙈'}</span>
      ${i >= DEFAULT_SCENARIOS.length || !DEFAULT_SCENARIOS.find(d => d.id === sc.id)
        ? `<span class="del-btn" onclick="event.stopPropagation();deleteAdminScenario(${i})">✕</span>` : ''}
    </button>
  `).join('');
}

function toggleHideScenario(idx) {
  const scenarios = getScenarios();
  scenarios[idx].hidden = !scenarios[idx].hidden;
  saveScenarios(scenarios);
  renderAdminSidebar();
  showToast(scenarios[idx].hidden ? '🙈 메인 화면에서 숨겼습니다' : '👁 메인 화면에 표시됩니다');
}

function selectAdminScenario(idx) {
  adminSelectedScenarioIndex = idx;
  renderAdminSidebar();
  const sc = getScenarios()[idx];
  renderAdminEditor(sc, idx);
}

function escAttr(str) {
  return String(str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeHtmlAdmin(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderAdminEditor(sc, idx) {
  const area = document.getElementById('admin-edit-area');
  adminKeywordState = {};
  sc.phases.forEach((p, pi) => {
    Object.entries(p.missions).forEach(([role, m]) => {
      const normRole = normalizeRole(role);
      const kwKey = 'p' + pi + '_' + normRole.replace(/\//g, '_');
      if (!adminKeywordState[kwKey]) adminKeywordState[kwKey] = [];
      (m.keywords || []).forEach(k => { if (!adminKeywordState[kwKey].includes(k)) adminKeywordState[kwKey].push(k); });
    });
  });

  const phaseSections = sc.phases.map((p, pi) => {
    const activeRoles = getActiveRoles(p);
    const roleCheckboxes = ALL_ROLES.map(role => {
      const safeRole = role.replace(/\//g, '-');
      const safeId = `p${pi}-role-${safeRole}`;
      const checked = activeRoles.includes(role) ? 'checked' : '';
      const kwKey = 'p' + pi + '_' + role.replace(/\//g, '_');
      const hasMission = !!(adminKeywordState[kwKey] && adminKeywordState[kwKey].length > 0) ||
        Object.keys(p.missions).some(r => normalizeRole(r) === role && (p.missions[r].prompt || p.missions[r].answer));
      const btnHtml = hasMission
        ? `<button type="button" onclick="showMissionForRole(${pi},'${safeRole}')" style="margin-left:4px;padding:2px 8px;background:#eaf2ff;color:var(--primary);border:1px solid #b3cfee;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">미션 편집</button>`
        : `<button type="button" onclick="showMissionForRole(${pi},'${safeRole}')" style="margin-left:4px;padding:2px 8px;background:#f0fff0;color:#27ae60;border:1px solid #a9d6a9;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">+ 미션 추가</button>`;
      return `<label class="role-checkbox-label" style="cursor:pointer">
        <input type="checkbox" id="${safeId}" ${checked}> ${ROLE_ICONS[role] || ''} ${role}
        ${btnHtml}
      </label>`;
    }).join('');

    const missionSections = ALL_ROLES.map(role => {
      const safeRole = role.replace(/\//g, '-');
      const normRole = normalizeRole(role);
      const m = Object.entries(p.missions).find(([r]) => normalizeRole(r) === normRole);
      const mData = m ? m[1] : { prompt: '', answer: '', keywords: [] };
      const kwKey = 'p' + pi + '_' + normRole.replace(/\//g, '_');
      if (!adminKeywordState[kwKey]) adminKeywordState[kwKey] = [...(mData.keywords || [])];
      const tagsHtml = (adminKeywordState[kwKey] || []).map((kw, ki) =>
        `<span class="kw-admin-tag">${escapeHtmlAdmin(kw)}<button type="button" onclick="removeKeyword('${kwKey}',${ki})">×</button></span>`
      ).join('');
      return `
        <div class="admin-role-section" id="mission-section-${pi}-${safeRole}" style="display:none">
          <h4>${ROLE_ICONS[role] || ''} ${role} 미션
            <button type="button" onclick="hideMissionSection(${pi},'${safeRole}')" style="float:right;background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:inherit">▲ 접기</button>
          </h4>
          <div class="admin-field"><label>미션 질문 (참가자에게 표시)</label>
            <textarea id="p${pi}-${safeRole}-prompt" rows="2">${escAttr(mData.prompt)}</textarea></div>
          <div class="admin-field"><label>모범 답안</label>
            <textarea id="p${pi}-${safeRole}-answer" rows="4">${escAttr(mData.answer)}</textarea></div>
          <div class="admin-field"><label>채점 키워드 <small style="font-weight:400;color:var(--muted)">(쉼표로 구분하여 추가)</small></label>
            <div class="kw-admin-wrap" id="kw-tags-${kwKey}">${tagsHtml}</div>
            <div style="display:flex;gap:6px">
              <input class="kw-admin-input" id="kw-input-${kwKey}" placeholder="키워드 입력 후 Enter 또는 추가 클릭"
                onkeydown="if(event.key==='Enter'){event.preventDefault();addKeyword('${kwKey}')}">
              <button type="button" onclick="addKeyword('${kwKey}')"
                style="padding:6px 12px;background:var(--primary);color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">추가</button>
              <button type="button" onclick="clearAllKeywords('${kwKey}')"
                style="padding:6px 10px;background:white;color:#c0392b;border:1.5px solid #c0392b;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">전체 삭제</button>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
    <div class="admin-phase-section">
      <div class="admin-phase-header" onclick="toggleAdminPhase(${pi})">
        <span>${p.emoji}</span>
        <span>${p.id}단계: ${p.title}</span>
        <span class="toggle-icon" id="phase-toggle-${pi}">▼</span>
      </div>
      <div class="admin-phase-body" id="phase-body-${pi}">
        <div class="admin-field-row">
          <div class="admin-field"><label>단계 제목</label><input id="p${pi}-title" value="${escAttr(p.title)}"></div>
          <div class="admin-field"><label>이모지</label><input id="p${pi}-emoji" value="${escAttr(p.emoji)}" style="max-width:80px"></div>
        </div>
        <div class="admin-field-row">
          <div class="admin-field"><label>날짜/시기</label><input id="p${pi}-date" value="${escAttr(p.date)}"></div>
          <div class="admin-field"><label>제한시간 (초)</label><input type="number" id="p${pi}-duration" value="${p.duration}"></div>
        </div>
        <div class="admin-field"><label>상황 설명</label><textarea id="p${pi}-situation" rows="3">${escAttr(p.situation)}</textarea></div>
        <div class="admin-field">
          <label>👥 이 단계 참여 역할 <small style="font-weight:400;color:var(--muted)">(역할 옆 버튼으로 미션 편집)</small></label>
          <div class="role-checkbox-group">${roleCheckboxes}</div>
        </div>
        ${missionSections}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)">
          <button type="button" onclick="deletePhase(${idx},${pi})" style="padding:7px 16px;background:white;color:#c0392b;border:1.5px solid #c0392b;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🗑 이 단계 삭제</button>
          <button type="button" onclick="toggleAdminPhase(${pi})" style="padding:7px 18px;background:white;color:var(--muted);border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">▲ ${p.id}단계 접기</button>
        </div>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = `
    <div class="admin-section">
      <h2>📋 시나리오 기본 정보</h2>
      <div class="admin-field-row">
        <div class="admin-field"><label>시나리오 이름</label><input id="admin-sc-name" value="${escAttr(sc.name)}"></div>
        <div class="admin-field"><label>이모지 아이콘</label><input id="admin-sc-emoji" value="${escAttr(sc.emoji)}" style="max-width:80px"></div>
      </div>
      <div class="admin-field"><label>색상 (hex)</label><input type="color" id="admin-sc-color" value="${sc.color}" style="width:60px;height:36px;padding:2px;cursor:pointer"></div>
      <div class="admin-field"><label>시나리오 설명</label><textarea id="admin-sc-desc" rows="2">${escAttr(sc.description)}</textarea></div>
    </div>
    <div class="admin-section">
      <h2>📝 단계별 내용 편집 <small style="font-size:12px;font-weight:400;color:var(--muted)">— Ctrl+S 로 저장</small></h2>
      ${phaseSections}
      <div style="margin-top:10px">
        <button type="button" onclick="addPhase(${idx})"
          style="width:100%;padding:11px;background:#f0fdf4;color:#27ae60;border:2px dashed #6fcf97;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s"
          onmouseover="this.style.background='#e0f8ec'" onmouseout="this.style.background='#f0fdf4'">＋ 단계 추가</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0;padding-bottom:40px">
      <button class="btn-admin-save" onclick="saveAdminScenario(${idx})">💾 저장 (Ctrl+S)</button>
      <button class="btn-admin-danger" onclick="confirmDeleteScenario(${idx})">🗑 이 시나리오 삭제</button>
    </div>`;
}

function showMissionForRole(pi, safeRole) {
  const el = document.getElementById(`mission-section-${pi}-${safeRole}`);
  if (el) { el.style.display = ''; el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}
function hideMissionSection(pi, safeRole) {
  const el = document.getElementById(`mission-section-${pi}-${safeRole}`);
  if (el) el.style.display = 'none';
}
function toggleAdminPhase(pi) {
  const body = document.getElementById(`phase-body-${pi}`);
  const icon = document.getElementById(`phase-toggle-${pi}`);
  if (body.classList.contains('open')) {
    body.classList.remove('open'); icon.textContent = '▼';
  } else {
    body.classList.add('open'); icon.textContent = '▲';
  }
}

function addKeyword(kwKey) {
  const input = document.getElementById(`kw-input-${kwKey}`);
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;
  if (!adminKeywordState[kwKey]) adminKeywordState[kwKey] = [];
  raw.split(',').map(s => s.trim()).filter(Boolean).forEach(val => {
    if (!adminKeywordState[kwKey].includes(val)) adminKeywordState[kwKey].push(val);
  });
  input.value = '';
  refreshKeywordTags(kwKey);
}
function removeKeyword(kwKey, ki) {
  if (!adminKeywordState[kwKey]) return;
  adminKeywordState[kwKey].splice(ki, 1);
  refreshKeywordTags(kwKey);
}
function refreshKeywordTags(kwKey) {
  const container = document.getElementById(`kw-tags-${kwKey}`);
  if (!container) return;
  container.innerHTML = (adminKeywordState[kwKey] || []).map((kw, ki) =>
    `<span class="kw-admin-tag">${escapeHtmlAdmin(kw)}<button type="button" onclick="removeKeyword('${kwKey}',${ki})">×</button></span>`
  ).join('');
}

function clearAllKeywords(kwKey) {
  if (!adminKeywordState[kwKey] || adminKeywordState[kwKey].length === 0) return;
  if (!confirm('이 역할의 채점 키워드를 모두 삭제할까요?')) return;
  adminKeywordState[kwKey] = [];
  refreshKeywordTags(kwKey);
}

// 현재 에디터 DOM 값을 localStorage의 scenarios 배열에 반영 (Firebase 저장 없음)
function syncEditorToLocal(idx) {
  const scenarios = getScenarios();
  const sc = scenarios[idx];
  const nameEl = document.getElementById('admin-sc-name');
  if (nameEl) sc.name = nameEl.value.trim() || sc.name;
  const emojiEl = document.getElementById('admin-sc-emoji');
  if (emojiEl) sc.emoji = emojiEl.value.trim() || sc.emoji;
  const colorEl = document.getElementById('admin-sc-color');
  if (colorEl) sc.color = colorEl.value;
  const descEl = document.getElementById('admin-sc-desc');
  if (descEl) sc.description = descEl.value.trim();
  sc.phases.forEach((p, pi) => {
    const titleEl = document.getElementById(`p${pi}-title`);
    if (titleEl) p.title = titleEl.value.trim() || p.title;
    const emojiEl2 = document.getElementById(`p${pi}-emoji`);
    if (emojiEl2) p.emoji = emojiEl2.value.trim() || p.emoji;
    const dateEl = document.getElementById(`p${pi}-date`);
    if (dateEl) p.date = dateEl.value.trim();
    const durEl = document.getElementById(`p${pi}-duration`);
    if (durEl) p.duration = parseInt(durEl.value) || p.duration;
    const sitEl = document.getElementById(`p${pi}-situation`);
    if (sitEl) p.situation = sitEl.value.trim();
    p.activeRoles = ALL_ROLES.filter(role => {
      const safeRole = role.replace(/\//g, '-');
      const el = document.getElementById(`p${pi}-role-${safeRole}`);
      return el && el.checked;
    });
    ALL_ROLES.forEach(role => {
      const safeRole = role.replace(/\//g, '-');
      const promptEl = document.getElementById(`p${pi}-${safeRole}-prompt`);
      const answerEl = document.getElementById(`p${pi}-${safeRole}-answer`);
      const kwKey = 'p' + pi + '_' + role.replace(/\//g, '_');
      if (promptEl || answerEl) {
        if (!p.missions[role]) p.missions[role] = { prompt: '', answer: '', keywords: [] };
        if (promptEl) p.missions[role].prompt = promptEl.value.trim();
        if (answerEl) p.missions[role].answer = answerEl.value.trim();
        p.missions[role].keywords = adminKeywordState[kwKey] || [];
      }
    });
  });
  localStorage.setItem('ttx_admin_scenarios', JSON.stringify(scenarios));
  return scenarios;
}

function addPhase(idx) {
  const scenarios = syncEditorToLocal(idx);
  const sc = scenarios[idx];
  const newId = sc.phases.length + 1;
  sc.phases.push({
    id: newId,
    title: '새 단계',
    emoji: '🆕',
    color: '#2c3e50',
    colorClass: `phase-${newId}-color`,
    activeRoles: [],
    date: '',
    situation: '',
    duration: 300,
    missions: {}
  });
  localStorage.setItem('ttx_admin_scenarios', JSON.stringify(scenarios));
  renderAdminEditor(sc, idx);
  // 새로 추가된 단계 자동 펼치기 & 스크롤
  setTimeout(() => {
    const newPi = sc.phases.length - 1;
    const body = document.getElementById(`phase-body-${newPi}`);
    if (body && !body.classList.contains('open')) toggleAdminPhase(newPi);
    body && body.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function deletePhase(idx, pi) {
  const scenarios = getScenarios();
  const sc = scenarios[idx];
  if (sc.phases.length <= 1) {
    alert('최소 1개의 단계는 있어야 합니다.');
    return;
  }
  const phase = sc.phases[pi];
  if (!confirm(`${phase.id}단계 "${phase.title}"을(를) 삭제할까요?\n이 단계의 모든 미션과 키워드가 사라집니다.`)) return;
  const updated = syncEditorToLocal(idx);
  updated[idx].phases.splice(pi, 1);
  // 단계 ID 재정렬
  updated[idx].phases.forEach((p, i) => { p.id = i + 1; });
  localStorage.setItem('ttx_admin_scenarios', JSON.stringify(updated));
  renderAdminEditor(updated[idx], idx);
}

function saveAdminScenario(idx) {
  const scenarios = getScenarios();
  const sc = scenarios[idx];
  sc.name = document.getElementById('admin-sc-name').value.trim() || sc.name;
  sc.emoji = document.getElementById('admin-sc-emoji').value.trim() || sc.emoji;
  sc.color = document.getElementById('admin-sc-color').value;
  sc.description = document.getElementById('admin-sc-desc').value.trim();

  sc.phases.forEach((p, pi) => {
    p.title = document.getElementById(`p${pi}-title`).value.trim() || p.title;
    p.emoji = document.getElementById(`p${pi}-emoji`).value.trim() || p.emoji;
    p.date = document.getElementById(`p${pi}-date`).value.trim();
    p.duration = parseInt(document.getElementById(`p${pi}-duration`).value) || p.duration;
    p.situation = document.getElementById(`p${pi}-situation`).value.trim();
    p.activeRoles = ALL_ROLES.filter(role => {
      const safeRole = role.replace(/\//g, '-');
      const el = document.getElementById(`p${pi}-role-${safeRole}`);
      return el && el.checked;
    });
    ALL_ROLES.forEach(role => {
      const safeRole = role.replace(/\//g, '-');
      const promptEl = document.getElementById(`p${pi}-${safeRole}-prompt`);
      const answerEl = document.getElementById(`p${pi}-${safeRole}-answer`);
      const kwKey = 'p' + pi + '_' + role.replace(/\//g, '_');
      if (promptEl || answerEl) {
        if (!p.missions[role]) p.missions[role] = { prompt: '', answer: '', keywords: [] };
        if (promptEl) p.missions[role].prompt = promptEl.value.trim();
        if (answerEl) p.missions[role].answer = answerEl.value.trim();
        p.missions[role].keywords = adminKeywordState[kwKey] || [];
      }
    });
  });

  localStorage.setItem('ttx_admin_scenarios', JSON.stringify(scenarios));
  renderAdminSidebar();
  showToast('⏳ Firebase에 저장 중...');

  db.ref('settings/scenarios').set(scenariosToFirebase(scenarios))
    .then(() => showToast('✅ 저장 완료! 모든 기기에 즉시 반영됩니다.'))
    .catch(e => {
      console.error('Firebase 저장 실패:', e);
      showToast('⚠️ 서버 저장 실패 — Firebase 규칙을 확인하세요');
    });
}

function addNewScenario() {
  const scenarios = getScenarios();
  const template = JSON.parse(JSON.stringify(DEFAULT_SCENARIOS[0]));
  template.id = 'custom_' + Date.now();
  template.name = '새 시나리오';
  template.emoji = '🦠';
  template.description = '새로운 감염병 시나리오';
  scenarios.push(template);
  saveScenarios(scenarios);
  renderAdminSidebar();
  selectAdminScenario(scenarios.length - 1);
}

function confirmDeleteScenario(idx) {
  const scenarios = getScenarios();
  if (confirm(`'${scenarios[idx].name}' 시나리오를 삭제할까요?`)) {
    deleteAdminScenario(idx);
  }
}

function deleteAdminScenario(idx) {
  const scenarios = getScenarios();
  scenarios.splice(idx, 1);
  saveScenarios(scenarios);
  adminSelectedScenarioIndex = -1;
  renderAdminSidebar();
  document.getElementById('admin-edit-area').innerHTML =
    `<div class="admin-empty"><span class="icon">📋</span><p>좌측에서 시나리오를 선택하거나<br>새 시나리오를 추가하세요.</p></div>`;
}

function changeAdminPassword() {
  const newPw = document.getElementById('new-pw').value.trim();
  if (!newPw) { alert('새 비밀번호를 입력하세요.'); return; }
  if (newPw.length < 4) { alert('비밀번호는 4자 이상이어야 합니다.'); return; }
  localStorage.setItem('ttx_admin_password', newPw);
  db.ref('settings/adminPassword').set(newPw)
    .catch(e => console.warn('Firebase 비밀번호 저장 실패:', e));
  document.getElementById('new-pw').value = '';
  showToast('✅ 비밀번호가 변경되었습니다');
}

function resetToDefault() {
  if (confirm('모든 시나리오를 기본값으로 초기화할까요?\n커스텀 시나리오는 모두 삭제됩니다.')) {
    localStorage.removeItem('ttx_admin_scenarios');
    db.ref('settings/scenarios').set(scenariosToFirebase(JSON.parse(JSON.stringify(DEFAULT_SCENARIOS))))
      .then(() => showToast('✅ 기본값으로 초기화되었습니다 (Firebase 반영)'))
      .catch(() => showToast('✅ 로컬 초기화 완료'));
    adminSelectedScenarioIndex = -1;
    renderAdminSidebar();
    document.getElementById('admin-edit-area').innerHTML =
      `<div class="admin-empty"><span class="icon">📋</span><p>기본값으로 초기화되었습니다.</p></div>`;
  }
}

function showToast(msg) {
  const t = document.getElementById('saved-toast');
  t.textContent = msg || '✅ 저장되었습니다';
  t.style.display = 'block';
  t.style.animation = 'none';
  setTimeout(() => { t.style.animation = 'slideUp 0.3s ease'; }, 10);
  setTimeout(() => { t.style.display = 'none'; }, 2400);
}

// Ctrl+S 저장 단축키
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    if (document.getElementById('screen-admin').style.display !== 'none' && adminSelectedScenarioIndex >= 0) {
      e.preventDefault();
      saveAdminScenario(adminSelectedScenarioIndex);
    }
  }
});

// Firebase에서 최신 비밀번호를 먼저 동기화한 뒤 세션 확인
db.ref('settings/adminPassword').once('value').then(snap => {
  if (snap.exists() && snap.val()) {
    localStorage.setItem('ttx_admin_password', snap.val());
  }
}).catch(() => {}).finally(() => {
  checkSession();
});
</script>
